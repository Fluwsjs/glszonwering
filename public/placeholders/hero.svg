<svg width="1920" height="1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="houseFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E0D5"/>
      <stop offset="100%" style="stop-color:#D9D0C3"/>
    </linearGradient>
    <linearGradient id="roofFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5A5A5A"/>
      <stop offset="100%" style="stop-color:#3A3A3A"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#heroBg)"/>
  
  <!-- Grid pattern -->
  <pattern id="heroGrid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.03"/>
  </pattern>
  <rect width="1920" height="1080" fill="url(#heroGrid)"/>
  
  <!-- Modern house silhouette -->
  <g transform="translate(1000, 300)">
    <!-- House body -->
    <rect x="0" y="200" width="600" height="400" fill="url(#houseFill)" opacity="0.3"/>
    
    <!-- Flat roof -->
    <rect x="-20" y="180" width="640" height="30" fill="url(#roofFill)" opacity="0.4"/>
    
    <!-- Windows with rolluiken -->
    <rect x="50" y="250" width="150" height="200" fill="#2C3E50" opacity="0.5"/>
    <rect x="50" y="250" width="150" height="120" fill="#4A4A4A" opacity="0.6"/>
    
    <rect x="250" y="250" width="150" height="200" fill="#2C3E50" opacity="0.5"/>
    <rect x="250" y="250" width="150" height="120" fill="#4A4A4A" opacity="0.6"/>
    
    <rect x="450" y="250" width="100" height="200" fill="#2C3E50" opacity="0.5"/>
    <rect x="450" y="250" width="100" height="120" fill="#4A4A4A" opacity="0.6"/>
  </g>
  
  <!-- Accent glow -->
  <circle cx="1600" cy="200" r="300" fill="#F47C20" opacity="0.1"/>
  <circle cx="1600" cy="200" r="200" fill="#F47C20" opacity="0.05"/>
</svg>
