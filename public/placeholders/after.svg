<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9"/>
      <stop offset="100%" style="stop-color:#87CEEB"/>
    </linearGradient>
    <linearGradient id="wall2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E0D5"/>
      <stop offset="100%" style="stop-color:#D9D0C3"/>
    </linearGradient>
    <linearGradient id="rolluik" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5A5A5A"/>
      <stop offset="50%" style="stop-color:#4A4A4A"/>
      <stop offset="100%" style="stop-color:#3A3A3A"/>
    </linearGradient>
    <linearGradient id="cassette" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6A6A6A"/>
      <stop offset="100%" style="stop-color:#4A4A4A"/>
    </linearGradient>
    <linearGradient id="glass2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A7D8F0"/>
      <stop offset="100%" style="stop-color:#7BC8F0"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <pattern id="slats" patternUnits="userSpaceOnUse" width="200" height="12">
      <rect width="200" height="10" fill="url(#rolluik)"/>
      <rect y="10" width="200" height="2" fill="#2A2A2A"/>
    </pattern>
  </defs>
  
  <!-- Sky -->
  <rect width="800" height="600" fill="url(#sky2)"/>
  
  <!-- Sun -->
  <circle cx="680" cy="80" r="45" fill="#FFF176"/>
  <circle cx="680" cy="80" r="60" fill="#FFF176" opacity="0.4"/>
  
  <!-- Modern house structure -->
  <rect x="100" y="180" width="600" height="350" fill="url(#wall2)" filter="url(#shadow2)"/>
  
  <!-- Roof overhang -->
  <rect x="80" y="160" width="640" height="30" fill="#4A4A4A"/>
  
  <!-- Large window left - WITH ROLLUIK -->
  <rect x="140" y="220" width="200" height="250" fill="#2C3E50" rx="2"/>
  <!-- Cassette (rolluik housing) -->
  <rect x="138" y="200" width="204" height="25" rx="4" fill="url(#cassette)"/>
  <rect x="143" y="205" width="194" height="15" rx="2" fill="#3A3A3A"/>
  <!-- Rolluik (70% closed) -->
  <rect x="145" y="225" width="190" height="168" fill="url(#slats)"/>
  <!-- Visible glass below -->
  <rect x="145" y="393" width="190" height="72" fill="url(#glass2)"/>
  <rect x="237" y="393" width="4" height="72" fill="#4A4A4A"/>
  <!-- Guide rails -->
  <rect x="140" y="220" width="6" height="250" fill="#3A3A3A"/>
  <rect x="334" y="220" width="6" height="250" fill="#3A3A3A"/>
  
  <!-- Large window right - WITH ROLLUIK -->
  <rect x="460" y="220" width="200" height="250" fill="#2C3E50" rx="2"/>
  <!-- Cassette (rolluik housing) -->
  <rect x="458" y="200" width="204" height="25" rx="4" fill="url(#cassette)"/>
  <rect x="463" y="205" width="194" height="15" rx="2" fill="#3A3A3A"/>
  <!-- Rolluik (70% closed) -->
  <rect x="465" y="225" width="190" height="168" fill="url(#slats)"/>
  <!-- Visible glass below -->
  <rect x="465" y="393" width="190" height="72" fill="url(#glass2)"/>
  <rect x="557" y="393" width="4" height="72" fill="#4A4A4A"/>
  <!-- Guide rails -->
  <rect x="460" y="220" width="6" height="250" fill="#3A3A3A"/>
  <rect x="654" y="220" width="6" height="250" fill="#3A3A3A"/>
  
  <!-- Door -->
  <rect x="365" y="330" width="70" height="140" fill="#5D4037" rx="2"/>
  <rect x="370" y="335" width="60" height="60" fill="#6D4C41"/>
  <circle cx="420" cy="405" r="6" fill="#FFD700"/>
  
  <!-- Ground/terrace -->
  <rect x="0" y="530" width="800" height="70" fill="#8D6E63"/>
  <rect x="100" y="530" width="600" height="10" fill="#6D4C41"/>
  
  <!-- Positive indicators -->
  <g transform="translate(200, 490)">
    <circle r="20" fill="#4CAF50" opacity="0.9"/>
    <text x="0" y="6" font-family="Arial" font-size="18" fill="white" text-anchor="middle">✓</text>
  </g>
  <text x="200" y="525" font-family="Arial" font-size="11" fill="#4CAF50" text-anchor="middle" font-weight="bold">Koel</text>
  
  <g transform="translate(520, 490)">
    <circle r="20" fill="#4CAF50" opacity="0.9"/>
    <text x="0" y="6" font-family="Arial" font-size="18" fill="white" text-anchor="middle">✓</text>
  </g>
  <text x="520" y="525" font-family="Arial" font-size="11" fill="#4CAF50" text-anchor="middle" font-weight="bold">Privacy</text>
  
  <!-- Temperature indicator (cooler) -->
  <g transform="translate(50, 300)">
    <rect x="0" y="0" width="30" height="100" rx="15" fill="#FFF" opacity="0.9"/>
    <rect x="5" y="60" width="20" height="35" rx="10" fill="#4CAF50"/>
    <circle cx="15" cy="85" r="12" fill="#4CAF50"/>
    <text x="15" y="20" font-family="Arial" font-size="10" fill="#333" text-anchor="middle" font-weight="bold">21°</text>
  </g>
  
  <!-- Energy saving badge -->
  <g transform="translate(720, 520)">
    <circle r="35" fill="#F47C20"/>
    <text x="0" y="-8" font-family="Arial" font-size="11" fill="#000" text-anchor="middle" font-weight="bold">Tot 50%</text>
    <text x="0" y="8" font-family="Arial" font-size="10" fill="#000" text-anchor="middle">energie</text>
    <text x="0" y="22" font-family="Arial" font-size="10" fill="#000" text-anchor="middle">besparing</text>
  </g>
</svg>
